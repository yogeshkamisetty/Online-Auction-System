<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Auctions | Golden Hammer Auctions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="site-header">
        <div class="container navbar">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    <span class="logo-icon">G</span>
                    <span class="logo-text">Golden Hammer Auctions</span>
                </a>
                <nav class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="browse.html" class="active">Browse Auctions</a>
                    <a href="dashboard.html">Dashboard</a>
                    <a href="profile.html">Profile</a>
                </nav>
            </div>
            <div class="nav-right">
                <a href="login.html" class="login-link">Log In</a>
                <a href="register.html" class="btn btn-dark">Get Started</a>
            </div>
        </div>
    </header>

    <main class="container page-spacing">
        
        <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;">
            <h1 class="page-title" style="margin: 0;">Browse All Categories</h1>
            <div class="search-container" style="display: flex; gap: 8px; flex: 0 1 400px; width: 100%;">
                <input type="text" id="searchInput" placeholder="Search items, categories..." style="flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border-color, #e5e7eb); border-radius: 6px; font-family: inherit; font-size: 0.95rem;">
                <button class="btn btn-primary" onclick="applyFilters()" style="padding: 0.75rem 1.5rem;">Search</button>
            </div>
        </div>
        
        <div class="split-layout">
            
            <aside class="sidebar">
                <h3 class="sidebar-title">Filters</h3>
            
                <div class="filter-group">
                    <h4>Categories</h4>
                    <ul class="filter-list" id="categoryFilters">
                        <li><label><input type="checkbox" value="Collections"> Collections</label></li>
                        <li><label><input type="checkbox" value="Electronics"> Electronics</label></li>
                        <li><label><input type="checkbox" value="Furniture"> Furniture</label></li>
                        <li><label><input type="checkbox" value="Accessories"> Accessories</label></li>
                        <li><label><input type="checkbox" value="Vehicles"> Vehicles</label></li>
                    </ul>
                </div>
                
                <div class="filter-group">
                    <h4>Price Range</h4>
                    <div class="price-inputs">
                        <input type="number" id="minPrice" placeholder="Min $" class="price-input"> 
                        <span>-</span> 
                        <input type="number" id="maxPrice" placeholder="Max $" class="price-input">
                    </div>
                </div>
                
                <button class="btn btn-primary filter-btn" onclick="applyFilters()">Apply Filters</button>
            </aside>

            <div class="main-content">
                
                <div class="auction-grid">
                    </div>
                
            </div>
            
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Golden Hammer Auctions. All rights reserved.</p>
        </div>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
