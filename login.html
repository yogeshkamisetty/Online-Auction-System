<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Golden Hammer Auctions</title>
    <link rel="icon" href="images/logo2.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header class="site-header">
        <div class="container navbar">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    <img src="images/logo2.png" alt="Logo" class="logo-icon" style="height: 36px; width: 36px; border-radius: 50%; object-fit: contain;">
                    <span class="logo-text">Golden Hammer Auctions</span>
                </a>
                <nav class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="browse.html">Browse Auctions</a>
                    <a href="dashboard.html">Dashboard</a>
                </nav>
            </div>
            <div class="nav-right">
                <a href="login.html" class="active login-link">Log In</a>
                <a href="register.html" class="btn btn-dark">Get Started</a>
            </div>
        </div>
    </header>

    <main class="auth-wrapper">

        <div class="auth-card">
            <h2 class="auth-title">Account Login</h2>

            <form id="loginForm" class="auth-form">

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="text" id="email" placeholder="name@example.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <p id="errorMessage"
                    style="font-size: 0.85rem; font-weight: 600; margin-bottom: 15px; text-align: center; min-height: 20px;">
                </p>

                <button type="submit" class="btn btn-primary auth-btn">Log In</button>
            </form>

            <p class="auth-toggle">Don't have an account? <a href="register.html">Register here</a></p>
        </div>

    </main>

    <script>
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', function (event) {

            event.preventDefault();

            const emailInput = document.getElementById('email').value;
            const passwordInput = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;



            if (emailInput === "") {
                errorMessage.textContent = "Please enter your email address.";
                errorMessage.style.color = "#e11d48";
                return;
            }

            if (!emailRegex.test(emailInput)) {
                errorMessage.textContent = "Please enter a valid email address (e.g., name@email.com).";
                errorMessage.style.color = "#e11d48";
                return;
            }

            if (passwordInput === "") {
                errorMessage.textContent = "Please enter your password.";
                errorMessage.style.color = "#e11d48";
                return;
            }

            if (passwordInput.length < 6) {
                errorMessage.textContent = "Password must be at least 6 characters long.";
                errorMessage.style.color = "#e11d48";
                return;
            }

            errorMessage.textContent = "Login successful! Redirecting...";
            errorMessage.style.color = "#166534";

            setTimeout(function () {
                window.location.href = "dashboard.html";
            }, 1000);

        });
    </script>
</body>

</html>
