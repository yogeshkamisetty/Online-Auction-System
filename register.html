<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Golden Hammer Auctions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="site-header">
        <div class="container navbar">
            <div class="nav-left">
                <a href="index.html" class="logo">
                    <span class="logo-icon">G</span>
                    <span class="logo-text">Golden Hammer Auctions</span>
                </a>
                <nav class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="browse.html">Browse Auctions</a>
                </nav>
            </div>
            <div class="nav-right">
                <a href="login.html" class="login-link">Log In</a>
                <a href="register.html" class="btn btn-dark">Get Started</a>
            </div>
        </div>
    </header>

    <main class="auth-wrapper">
        
        <div class="auth-card">
            <h2 class="auth-title">Create an Account</h2>
            
            <form id="registerForm" class="auth-form">
                
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="e.g. Jane Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a strong password">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Type your password again">
                </div>
                
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                    <input type="checkbox" id="terms" style="width: 18px; height: 18px; cursor: pointer;">
                    <label for="terms" style="font-size: 0.85rem; color: var(--text-muted); cursor: pointer;">
                        I agree to the <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 600;">Terms & Conditions</a>
                    </label>
                </div>
                
                <p id="errorMessage" style="font-size: 0.85rem; font-weight: 600; margin-bottom: 15px; text-align: center; min-height: 20px;"></p>

                <button type="submit" class="btn btn-primary auth-btn">Create Account</button>
            </form>
            
            <p class="auth-toggle">Already have an account? <a href="login.html">Log In here</a></p>
        </div>

    </main>

    <script>
        const registerForm = document.getElementById('registerForm');

        registerForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            const errorMessage = document.getElementById('errorMessage');

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (fullName === "") {
                errorMessage.textContent = "Please enter your full name.";
                errorMessage.style.color = "#e11d48";
                return;
            }

            if (email === "") {
                errorMessage.textContent = "Please enter your email address.";
                errorMessage.style.color = "#e11d48";
                return;
            }

            if (!emailRegex.test(email)) {
                errorMessage.textContent = "Please enter a valid email address (e.g., name@email.com).";
                errorMessage.style.color = "#e11d48";
                return;
            }

            if (password === "") {
                errorMessage.textContent = "Please enter a password.";
                errorMessage.style.color = "#e11d48";
                return;
            }

            if (password.length < 6) {
                errorMessage.textContent = "Password must be at least 6 characters long.";
                errorMessage.style.color = "#e11d48";
                return;
            }

            if (confirmPassword === "") {
                errorMessage.textContent = "Please confirm your password.";
                errorMessage.style.color = "#e11d48";
                return;
            }

            if (password !== confirmPassword) {
                errorMessage.textContent = "Passwords do not match.";
                errorMessage.style.color = "#e11d48";
                return;
            }

            if (!terms) {
                errorMessage.textContent = "Please agree to the Terms & Conditions.";
                errorMessage.style.color = "#e11d48";
                return;
            }

            errorMessage.textContent = "Registration successful! Redirecting...";
            errorMessage.style.color = "#166534";

            setTimeout(function () {
                window.location.href = "login.html";
            }, 1000);
        });
    </script>

</body>
</html>
